services:
  - type: web
    name: naari-care-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: TF_CPP_MIN_LOG_LEVEL
        value: 3
    healthCheckPath: /
    plan: starter